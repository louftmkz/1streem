name: Spotify Stats Scraper

on:
  schedule:
    # täglich 03:00 UTC (~ 04/05 Uhr Berlin je nach Sommerzeit)
    - cron: '0 3 * * *'
  workflow_dispatch: # Manueller Trigger über die GitHub UI

permissions:
  contents: write # damit der Job stats.json zurück ins Repo committen kann

concurrency:
  group: spotify-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          SPOTIFY_SP_DC: ${{ secrets.SPOTIFY_SP_DC }}
          SPOTIFY_ARTIST_ID: ${{ vars.SPOTIFY_ARTIST_ID || '3LaYDsZXr5HlfDY7vtxq0v' }}
        run: node scripts/scrape-spotify.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/stats.json)" ]; then
            git add public/stats.json
            git commit -m "chore(stats): daily Spotify update [skip ci]"
            git push
            echo "Stats updated and pushed."
          else
            echo "No changes to stats.json — nothing to commit."
          fi
